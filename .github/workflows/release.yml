name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    # Temporary: Hetzner arc-runner-unityinflow (X64) fleet offline for the 0.1.0 release;
    # JVM/Maven-Central artifacts are architecture-independent, so publish on the online
    # ARM64 orangepi runner. Revert to [arc-runner-unityinflow] once the X64 fleet is back.
    runs-on: [orangepi]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # The Maven coordinates come from the Gradle `version` property (gradle.properties),
      # while the release notes derive the version from the git tag. Fail fast if they
      # disagree — otherwise the release page would instruct users to depend on a version
      # that does not match the published Sonatype bundle.
      - name: Verify tag matches Gradle version
        run: |
          GRADLE_VERSION=$(./gradlew properties -q --no-configuration-cache | awk '/^version:/ {print $2}')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$GRADLE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match Gradle version $GRADLE_VERSION" >&2
            exit 1
          fi

      - name: Lint + build + unit tests
        run: ./gradlew clean build --no-configuration-cache

      # ---------------------------------------------------------------------------
      # Pre-publish assertion gates (verify-before-tag). Maven Central releases are
      # immutable (RESEARCH Pitfall 5), so the complete signed bundle is proven
      # correct here BEFORE the irreversible Publish step below.
      # ---------------------------------------------------------------------------

      # STARTER-05: the javadoc jar must exist and contain real Dokka-rendered docs
      # (not the old empty placeholder). `build` does not produce the publication's
      # javadoc jar, so build it explicitly first.
      - name: Gate — Dokka javadoc jar present and non-empty
        run: |
          ./gradlew :budget-breaker-spring-boot-starter:dokkaJavadocJar --no-configuration-cache
          JAVADOC_JAR=$(ls budget-breaker-spring-boot-starter/build/libs/*-javadoc.jar 2>/dev/null | head -1)
          if [ -z "$JAVADOC_JAR" ]; then
            echo "No -javadoc.jar produced for the starter module" >&2
            exit 1
          fi
          RENDERED=$(unzip -l "$JAVADOC_JAR" | grep -Ec '\.(html|js|css)$')
          if [ "$RENDERED" -eq 0 ]; then
            echo "Javadoc jar $JAVADOC_JAR contains no rendered docs (empty placeholder)" >&2
            exit 1
          fi
          echo "Javadoc jar OK: $JAVADOC_JAR ($RENDERED rendered files)"

      # STARTER-03: the starter jar must carry the generated config metadata.
      - name: Gate — spring-configuration-metadata.json present in starter jar
        run: |
          MAIN_JAR=$(ls budget-breaker-spring-boot-starter/build/libs/*.jar | grep -vE '\-(sources|javadoc)\.jar$' | head -1)
          if [ -z "$MAIN_JAR" ]; then
            echo "No main starter jar produced" >&2
            exit 1
          fi
          if ! unzip -l "$MAIN_JAR" | grep -q 'META-INF/spring-configuration-metadata.json'; then
            echo "Starter jar $MAIN_JAR is missing META-INF/spring-configuration-metadata.json" >&2
            exit 1
          fi
          echo "Config metadata OK in $MAIN_JAR"

      # STARTER-04: build-only deps must not leak into the consumer's runtime classpath /
      # published POM. Fail if any forbidden coordinate appears on runtimeClasspath.
      - name: Gate — POM cleanliness (no Kafka / leaked framework / config-processor)
        run: |
          DEPS=$(./gradlew :budget-breaker-spring-boot-starter:dependencies \
            --configuration runtimeClasspath --no-configuration-cache)
          LEAK=$(echo "$DEPS" | grep -Ei 'kafka|spring-boot-autoconfigure|spring-boot-actuator-autoconfigure|micrometer|configuration-processor' || true)
          if [ -n "$LEAK" ]; then
            echo "Forbidden build-only dependency leaked into runtimeClasspath:" >&2
            echo "$LEAK" >&2
            exit 1
          fi
          echo "POM cleanliness OK — no Kafka / leaked framework / config-processor on runtimeClasspath"

      - name: Publish aggregated bundle to Sonatype Central Portal
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: ./gradlew publishAggregationToCentralPortal --no-configuration-cache

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: budget-breaker ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            budget-breaker **${{ github.ref_name }}** is now available on Maven Central under `io.github.unityinflow`.

            ## Core library

            ```kotlin
            dependencies {
                implementation("io.github.unityinflow:budget-breaker:${{ steps.version.outputs.version }}")
            }
            ```

            ## Spring Boot starter (new in v0.1.0)

            Adds `@ConfigurationProperties`-based auto-configuration, `/actuator/budget` endpoint,
            and Micrometer metrics. Transitively brings the core library.

            ```kotlin
            dependencies {
                implementation("io.github.unityinflow:budget-breaker-spring-boot-starter:${{ steps.version.outputs.version }}")
            }
            ```

            **NOTE:** With `publishingType = "USER_MANAGED"`, artifacts land in a
            Sonatype Central Portal staging bundle after this workflow succeeds.
            A human must press "Publish" in the portal UI to promote them to
            Maven Central. Replication to `repo.maven.apache.org` takes ~30
            minutes after the button press.
